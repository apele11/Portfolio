<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Stakeholder Map – LockedIn</title>
  <desc>Concentric circle stakeholder map with University Students at the core, direct stakeholders in the middle ring, and indirect stakeholders in the outer ring.</desc>

  <!-- Background -->
  <rect width="680" height="680" fill="#F5F0E8" rx="12"/>

  <!-- ── RINGS ── -->
  <!-- Outer ring: Indirect (sage) -->
  <circle cx="340" cy="340" r="300" fill="#7A9E7E" opacity="0.22"/>
  <circle cx="340" cy="340" r="300" fill="none" stroke="#7A9E7E" stroke-width="1.5" opacity="0.5"/>

  <!-- Middle ring: Direct (teal) -->
  <circle cx="340" cy="340" r="200" fill="#2D6B6B" opacity="0.18"/>
  <circle cx="340" cy="340" r="200" fill="none" stroke="#2D6B6B" stroke-width="1.5" opacity="0.5"/>

  <!-- Core: Students (brown/orange) -->
  <circle cx="340" cy="340" r="95" fill="#6B2E0E" opacity="0.12"/>
  <circle cx="340" cy="340" r="95" fill="none" stroke="#6B2E0E" stroke-width="1.5" opacity="0.4"/>

  <!-- ── RING LABELS ── -->
  <!-- Indirect label (top of outer ring) -->
  <text x="340" y="62" text-anchor="middle" font-family="'Circular Std Bold', 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#7A9E7E" text-transform="uppercase" opacity="0.9">INDIRECT</text>

  <!-- Direct label (top of middle ring) -->
  <text x="340" y="152" text-anchor="middle" font-family="'Circular Std Bold', 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#2D6B6B" opacity="0.9">DIRECT</text>

  <!-- Core label (just above core circle) -->
  <text x="340" y="258" text-anchor="middle" font-family="'Circular Std Bold', 'Segoe UI', sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#6B2E0E" opacity="0.7">CORE</text>

  <!-- ── CORE: University Students ── -->
  <text x="340" y="334" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#6B2E0E">University</text>
  <text x="340" y="352" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#6B2E0E">Students</text>

  <!-- ── DIRECT STAKEHOLDERS ── -->
  <!-- Libraries (upper-left) -->
  <g>
    <circle cx="230" cy="230" r="28" fill="#2D6B6B" opacity="0.12"/>
    <circle cx="230" cy="230" r="28" fill="none" stroke="#2D6B6B" stroke-width="1" opacity="0.4"/>
    <text x="230" y="226" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="11" fill="#2D6B6B">Campus</text>
    <text x="230" y="240" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="11" fill="#2D6B6B">Libraries</text>
  </g>

  <!-- Coffee Shops (lower-left) -->
  <g>
    <circle cx="220" cy="450" r="28" fill="#2D6B6B" opacity="0.12"/>
    <circle cx="220" cy="450" r="28" fill="none" stroke="#2D6B6B" stroke-width="1" opacity="0.4"/>
    <text x="220" y="446" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="11" fill="#2D6B6B">Coffee</text>
    <text x="220" y="460" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="11" fill="#2D6B6B">Shops</text>
  </g>

  <!-- Dev Team (upper-right) -->
  <g>
    <circle cx="455" cy="228" r="28" fill="#2D6B6B" opacity="0.12"/>
    <circle cx="455" cy="228" r="28" fill="none" stroke="#2D6B6B" stroke-width="1" opacity="0.4"/>
    <text x="455" y="224" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="11" fill="#2D6B6B">Dev</text>
    <text x="455" y="238" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="11" fill="#2D6B6B">Team</text>
  </g>

  <!-- Management (right) -->
  <g>
    <circle cx="496" cy="340" r="28" fill="#2D6B6B" opacity="0.12"/>
    <circle cx="496" cy="340" r="28" fill="none" stroke="#2D6B6B" stroke-width="1" opacity="0.4"/>
    <text x="496" y="336" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="11" fill="#2D6B6B">Manage-</text>
    <text x="496" y="350" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="11" fill="#2D6B6B">ment</text>
  </g>

  <!-- Study Services (lower-right) -->
  <g>
    <circle cx="450" cy="450" r="28" fill="#2D6B6B" opacity="0.12"/>
    <circle cx="450" cy="450" r="28" fill="none" stroke="#2D6B6B" stroke-width="1" opacity="0.4"/>
    <text x="450" y="446" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="11" fill="#2D6B6B">Study</text>
    <text x="450" y="460" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="11" fill="#2D6B6B">Services</text>
  </g>

  <!-- ── INDIRECT STAKEHOLDERS ── -->
  <!-- Transportation (upper-left outer) -->
  <g>
    <circle cx="148" cy="178" r="26" fill="#7A9E7E" opacity="0.15"/>
    <circle cx="148" cy="178" r="26" fill="none" stroke="#7A9E7E" stroke-width="1" opacity="0.5"/>
    <text x="148" y="174" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="11" fill="#7A9E7E">Trans-</text>
    <text x="148" y="188" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="11" fill="#7A9E7E">portation</text>
  </g>

  <!-- University Admin (lower-left outer) -->
  <g>
    <circle cx="102" cy="460" r="26" fill="#7A9E7E" opacity="0.15"/>
    <circle cx="102" cy="460" r="26" fill="none" stroke="#7A9E7E" stroke-width="1" opacity="0.5"/>
    <text x="102" y="456" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="11" fill="#7A9E7E">University</text>
    <text x="102" y="470" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="11" fill="#7A9E7E">Admin</text>
  </g>

  <!-- Professors (upper-right outer) -->
  <g>
    <circle cx="540" cy="178" r="26" fill="#7A9E7E" opacity="0.15"/>
    <circle cx="540" cy="178" r="26" fill="none" stroke="#7A9E7E" stroke-width="1" opacity="0.5"/>
    <text x="540" y="182" text-anchor="middle" font-family="'Fedro Light', 'Segoe UI', sans-serif" font-size="11" fill="#7A9E7E">Professors</text>
  </g>

</svg>